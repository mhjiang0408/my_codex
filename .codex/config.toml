# model_provider = "fox"
# model_provider = "crs"
# model_provider = "meta"
# model_provider = "packycode"
model_provider = "groupt"
# model_provider = "xly"
# model_provider = "88code"
# model_provider = "right"
model = "gpt-5.5"
model_reasoning_effort = "high"
model_reasoning_summary = "detailed"
plan_mode_reasoning_effort = "xhigh"
model_verbosity = "high"
disable_response_storage = true
# same as `--sandbox workspace-write`
sandbox_mode = "workspace-write"
personality = "pragmatic"
web_search = "live"
service_tier = "fast"

[mcp_servers.feishu]
command = "npx"
args = [
    "-y", 
    "@larksuiteoapi/lark-mcp", 
    "mcp", 
    "-a",
    "cli_a90e3aacb1f9dbc2",
    "-s",
    "SMNzRdUcGuHxSgS5WFUyfcl5ucTaWIG1",
    "--oauth" 
]
startup_timeout_ms = 60000


[features]
skills = true
shell_snapshot = true
multi_agent = true
goals = true
terminal_resize_reflow = true

[sandbox_workspace_write]
# By default, the cwd for the Codex session will be writable as well as $TMPDIR
# (if set) and /tmp (if it exists). Setting the respective options to `true`
# will override those defaults.
exclude_tmpdir_env_var = false
exclude_slash_tmp = false

# Optional list of _additional_ writable roots beyond $TMPDIR and /tmp.
writable_roots = ["/inspire/hdd/project/qproject-fundationmodel/public/mhjiang/homework/MNIST"]

# Allow the command being run inside the sandbox to make outbound network
# requests. Disabled by default.
network_access = true

[model_providers.group]
base_url = "http://127.0.0.1:12580/openai"
name = "group"
requires_openai_auth = true
wire_api = "responses"
request_max_retries = 100            # retry failed HTTP requests
stream_max_retries = 100            # retry dropped SSE streams
stream_idle_timeout_ms = 30000000    # 5m idle timeout

